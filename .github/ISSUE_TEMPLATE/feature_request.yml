name: 功能建议
description: 建议通用的新能力或工作流改进。
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        请描述通用场景，不要上传真实剧本、未获授权的素材、API 密钥或含敏感内容的模型产物。

  - type: checkboxes
    id: safety_confirmation
    attributes:
      label: 提交前确认
      options:
        - label: 本建议不包含剧本正文、API 密钥、个人信息或其他敏感内容。
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请说明现有工作流在哪个环节无法满足需求。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述期望的命令、输入、输出或行为。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 可选。说明现有绕行方式或相关取舍。
