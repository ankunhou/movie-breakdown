name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装 uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: 同步锁定依赖
        run: uv sync --locked --all-groups --python ${{ matrix.python-version }}

      - name: Ruff 静态检查
        run: uv run ruff check .

      - name: Ruff 格式检查
        run: uv run ruff format --check .

      - name: 运行离线测试
        run: uv run pytest -m "not live" --cov-fail-under=85

  build:
    name: 构建与安装验证
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: 安装 uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: 校验锁文件
        run: uv lock --check

      - name: 构建源码包与 wheel
        run: uv build --no-sources --clear

      - name: 验证 wheel 安装与 CLI
        run: uv run --isolated --no-project --with dist/*.whl movie-breakdown --version

      - name: 验证源码包安装与 CLI
        run: uv run --isolated --no-project --with dist/*.tar.gz movie-breakdown --version

      - name: 保存构建产物
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7
